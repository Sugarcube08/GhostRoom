name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [android, ios, macos, windows, linux, web]
        include:
          - target: android
            os: ubuntu-24.04
            build_cmd: |
              flutter build apk --release
              flutter build appbundle --release
          - target: ios
            os: macos-latest
            build_cmd: flutter build ipa --release --no-codesign
          - target: macos
            os: macos-latest
            build_cmd: flutter build macos --release
          - target: windows
            os: windows-latest
            build_cmd: flutter build windows --release
          - target: linux
            os: ubuntu-24.04
            build_cmd: |
              sudo apt-get update
              sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-14-dev libglu1-mesa-dev libsecret-1-dev libjsoncpp-dev alien
              flutter build linux --release
          - target: web
            os: ubuntu-24.04
            build_cmd: flutter build web --release

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: |
          cd client
          flutter pub get
      - name: Build
        run: |
          cd client
          ${{ matrix.build_cmd }}
      
      - name: Package Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "web" ]; then
            cd client/build/web && zip -r ../../../ghostroom-web.zip .
          elif [ "${{ matrix.target }}" == "windows" ]; then
            cd client/build/windows/x64/runner/Release && 7z a ../../../../../../ghostroom-windows.zip .
          elif [ "${{ matrix.target }}" == "linux" ]; then
            # tar.gz
            cd client/build/linux/x64/release/bundle && tar -czvf ../../../../../../ghostroom-linux.tar.gz .
            cd ../../../../../../
            
            # .deb
            cd client
            DEB_DIR="build/linux/deb/ghostroom_1.0.0-1_amd64"
            mkdir -p "$DEB_DIR/DEBIAN" "$DEB_DIR/usr/bin" "$DEB_DIR/opt/ghostroom" "$DEB_DIR/usr/share/applications" "$DEB_DIR/usr/share/icons/hicolor/512x512/apps"
            cp -r build/linux/x64/release/bundle/* "$DEB_DIR/opt/ghostroom/"
            ln -sf /opt/ghostroom/ghostroom "$DEB_DIR/usr/bin/ghostroom"
            
            cat <<CTRL > "$DEB_DIR/DEBIAN/control"
Package: ghostroom
Version: 1.0.0-1
Section: utils
Priority: optional
Architecture: amd64
Depends: libgtk-3-0, libsecret-1-0
Maintainer: GhostRoom Team
Description: Privacy-First Ephemeral Communication
CTRL

            cat <<DESK > "$DEB_DIR/usr/share/applications/ghostroom.desktop"
[Desktop Entry]
Version=1.0
Name=GhostRoom
GenericName=GhostRoom
Comment=Privacy-First Ephemeral Communication
Terminal=false
Type=Application
Categories=Network;Chat;
Exec=/opt/ghostroom/ghostroom
Icon=ghostroom
DESK
            
            cp web/icons/Icon-512.png "$DEB_DIR/usr/share/icons/hicolor/512x512/apps/ghostroom.png"
            dpkg-deb --build "$DEB_DIR" "../ghostroom-linux.deb"
            
            # .rpm
            sudo alien -r ../ghostroom-linux.deb
            mv ghostroom-*.rpm ../ghostroom-linux.rpm
            
            # .AppImage
            cd ..
            wget -qO appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
            chmod +x appimagetool
            
            APPDIR="client/build/linux/AppDir"
            mkdir -p "$APPDIR"
            cp -r client/build/linux/x64/release/bundle/* "$APPDIR/"
            cp "client/$DEB_DIR/usr/share/applications/ghostroom.desktop" "$APPDIR/"
            cp "client/$DEB_DIR/usr/share/icons/hicolor/512x512/apps/ghostroom.png" "$APPDIR/"
            
            cat <<APP > "$APPDIR/AppRun"
#!/bin/sh
HERE="\$(dirname "\$(readlink -f "\${0}")")"
export LD_LIBRARY_PATH="\${HERE}/lib:\${LD_LIBRARY_PATH}"
exec "\${HERE}/ghostroom" "\$@"
APP
            chmod +x "$APPDIR/AppRun"
            
            ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APPDIR" ghostroom-linux.AppImage
          elif [ "${{ matrix.target }}" == "macos" ]; then
            cd client/build/macos/Build/Products/Release && zip -r ../../../../../../ghostroom-macos.zip ghostroom.app
          elif [ "${{ matrix.target }}" == "ios" ]; then
            cp client/build/ios/ipa/*.ipa ghostroom-ios.ipa
          elif [ "${{ matrix.target }}" == "android" ]; then
            cp client/build/app/outputs/flutter-apk/app-release.apk ghostroom-android.apk
            cp client/build/app/outputs/bundle/release/app-release.aab ghostroom-android.aab
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: ghostroom-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
